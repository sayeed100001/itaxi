<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iTaxi Premium</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        (function () {
            try {
                var raw = window.localStorage && window.localStorage.getItem('itaxi-storage');
                if (!raw) return;
                var parsed = JSON.parse(raw);
                var state = parsed && parsed.state ? parsed.state : parsed;

                if (state && state.isDarkMode) {
                    document.documentElement.classList.add('dark');
                }

                var lang = state && state.language;
                if (lang === 'fa') {
                    document.documentElement.dir = 'rtl';
                    document.documentElement.lang = 'fa';
                    document.documentElement.classList.add('font-fa');
                } else {
                    document.documentElement.dir = 'ltr';
                    document.documentElement.lang = 'en';
                    document.documentElement.classList.add('font-sans');
                }
            } catch (e) { }
        })();
    </script>
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
