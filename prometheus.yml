global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'itaxi-production'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'itaxi-app'
    static_configs:
      - targets:
          - 'localhost:3001'
          - 'localhost:3002'
          - 'localhost:3003'
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'localhost:9100'

  - job_name: 'mysql'
    static_configs:
      - targets:
          - 'localhost:9104'

  - job_name: 'redis'
    static_configs:
      - targets:
          - 'localhost:9121'

  - job_name: 'nginx'
    static_configs:
      - targets:
          - 'localhost:9113'
